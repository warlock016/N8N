name: edge

networks:
  edge:
    external: true

services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    networks: [edge]
    # No host ports; traffic arrives via cloudflared inside the network
    command:
      # Docker Provider Configuration
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.watch=true
      - --providers.docker.network=edge
      - --providers.docker.allowEmptyServices=true
      # Provider throttle to handle rapid config changes
      - --providers.providersThrottleDuration=10s
      # Entrypoints
      - --entryPoints.web.address=:80
      - --entryPoints.metrics.address=:8082
      - --entryPoints.ping.address=:8081
      # API & Dashboard
      - --api.dashboard=true
      # Prometheus metrics
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      # Logging
      - --log.level=INFO
      - --accesslog=true
      # Health check endpoint
      - --ping=true
      - --ping.entryPoint=ping
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      # Traefik dashboard at traefik.${DOMAIN_NAME}
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN_NAME}`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.entrypoints=web
      # Metrics endpoint
      - >
        traefik.http.routers.metrics.rule=Host(`traefik.${DOMAIN_NAME}`) &&
        Path(`/metrics`)
      - traefik.http.routers.metrics.service=prometheus@internal
      - traefik.http.routers.metrics.entrypoints=metrics
      - traefik.http.routers.metrics.middlewares=metrics-auth
      - "traefik.http.middlewares.metrics-auth.basicauth.users=metrics:$$apr1$$K1S6aVmJ$$eXuzqkAScyT4exq/YsOOx0"
    # Enable healthcheck for deployment validation
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:8081/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    networks: [edge]
    dns:
      - "1.1.1.1"
      - "1.0.0.1"
      - "8.8.8.8"
    environment:
      - TUNNEL_METRICS=127.0.0.1:2000
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
