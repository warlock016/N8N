[Unit]
# UFW's before.rules references the abuse-ips and abuse-subnets ipsets.
# If blocklist-restore.service fails, those sets won't exist and UFW
# will fail to load its rules. Make the dependency explicit so systemd
# refuses to start UFW in that degraded state — fail loud, not silent.
Requires=blocklist-restore.service
After=blocklist-restore.service
