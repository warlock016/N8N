name: System Monitoring

"on":
  schedule:
    # Check system health every hour
    - cron: '0 */1 * * *'
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of check to perform'
        required: true
        type: choice
        default: 'full'
        options:
          - full
          - services
          - performance
          - security
      environment:
        description: 'Environment to check'
        required: true
        type: choice
        default: 'production'
        options:
          - staging
          - production

jobs:
  system-health:
    runs-on: ubuntu-latest
    name: System Health Check
    
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Set deployment variables
        id: vars
        run: |
          echo "vps_host=${{ secrets.VPS_HOST }}" >> $GITHUB_OUTPUT
          echo "deploy_path=/opt/n8n-v2" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.vars.outputs.vps_host }} >> ~/.ssh/known_hosts

      - name: System Health Check
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ steps.vars.outputs.vps_host }} << 'EOF'
            set -e
            
            DEPLOY_PATH="${{ steps.vars.outputs.deploy_path }}"
            CHECK_TYPE="${{ github.event.inputs.check_type || 'full' }}"
            
            echo "🔍 System Health Check - Type: $CHECK_TYPE"
            echo "========================================"
            
            # Basic system info
            if [[ "$CHECK_TYPE" == "full" || "$CHECK_TYPE" == "performance" ]]; then
              echo "📊 System Information:"
              echo "Uptime: $(uptime)"
              echo "Memory: $(free -h | grep Mem)"
              echo "Disk: $(df -h / | tail -1)"
              echo "Load: $(cat /proc/loadavg)"
              echo ""
            fi
            
            # Docker system status
            echo "🐳 Docker Status:"
            echo "Docker version: $(docker --version)"
            echo "Running containers: $(docker ps --format 'table {{.Names}}\t{{.Status}}' | tail -n +2 | wc -l)"
            echo ""
            
            # Container health check
            if [[ "$CHECK_TYPE" == "full" || "$CHECK_TYPE" == "services" ]]; then
              echo "🏥 Container Health:"
              
              # Check for unhealthy containers
              unhealthy=$(docker ps --filter "health=unhealthy" --format "{{.Names}}" | wc -l)
              if [ "$unhealthy" -gt 0 ]; then
                echo "❌ Unhealthy containers detected:"
                docker ps --filter "health=unhealthy" --format "table {{.Names}}\t{{.Status}}"
                echo ""
              else
                echo "✅ All containers healthy"
              fi
              
              # Check container status
              echo "📦 Container Overview:"
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.RunningFor}}"
              echo ""
            fi
            
            # Service-specific checks
            if [[ "$CHECK_TYPE" == "full" || "$CHECK_TYPE" == "services" ]]; then
              echo "🌐 Service Connectivity:"
              
              # Check Traefik
              if docker ps | grep -q "edge-traefik"; then
                if docker exec edge-traefik-1 wget -qO- --timeout=5 http://localhost:80/ping >/dev/null 2>&1; then
                  echo "✅ Traefik: Healthy"
                else
                  echo "❌ Traefik: Not responding"
                fi
              else
                echo "❌ Traefik: Not running"
              fi
              
              # Check CloudFlared
              if docker ps | grep -q "edge-cloudflared"; then
                tunnel_logs=$(docker logs edge-cloudflared-1 --tail 5 2>/dev/null | grep -c "Registered tunnel connection" || echo 0)
                if [ "$tunnel_logs" -gt 0 ]; then
                  echo "✅ CloudFlared: Connected"
                else
                  echo "⚠️ CloudFlared: Connecting/Reconnecting"
                fi
              else
                echo "❌ CloudFlared: Not running"
              fi
              
              # Check N8N services
              n8n_services=$(find "$DEPLOY_PATH/services" -name "*n8n*" -type d 2>/dev/null | wc -l || echo 0)
              if [ "$n8n_services" -gt 0 ]; then
                echo "📊 N8N Services: $n8n_services found"
                for service_dir in "$DEPLOY_PATH/services"/*; do
                  if [ -d "$service_dir" ] && [[ "$(basename "$service_dir")" == *"n8n"* ]]; then
                    service_name=$(basename "$service_dir")
                    if docker ps | grep -q "$service_name"; then
                      echo "  ✅ $service_name: Running"
                    else
                      echo "  ❌ $service_name: Not running"
                    fi
                  fi
                done
              fi
              echo ""
            fi
            
            # Security checks
            if [[ "$CHECK_TYPE" == "full" || "$CHECK_TYPE" == "security" ]]; then
              echo "🔒 Security Status:"
              
              # Check for exposed ports (should only be SSH)
              echo "Open ports:"
              netstat -tuln | grep LISTEN | grep -E ":80|:443|:22|:3000|:5432|:9090" || echo "No suspicious ports open"
              
              # Check firewall status
              ufw status | head -10
              echo ""
            fi
            
            # Performance metrics
            if [[ "$CHECK_TYPE" == "full" || "$CHECK_TYPE" == "performance" ]]; then
              echo "⚡ Performance Metrics:"
              echo "CPU Usage: $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1"%"}')"
              echo "Memory Usage: $(free | grep Mem | awk '{printf("%.1f%%\n", $3/$2 * 100.0)}')"
              echo "Disk Usage: $(df / | tail -1 | awk '{print $5}')"
              
              # Docker resource usage
              echo ""
              echo "🐳 Docker Resource Usage:"
              docker stats --no-stream --format "table {{.Container}}\t{{.CPUPerc}}\t{{.MemUsage}}" | head -10
              echo ""
            fi
            
            # Generate summary
            echo "📋 Health Summary:"
            total_containers=$(docker ps -q | wc -l)
            running_containers=$(docker ps --filter "status=running" -q | wc -l)
            unhealthy_containers=$(docker ps --filter "health=unhealthy" -q | wc -l)
            
            echo "Total containers: $total_containers"
            echo "Running containers: $running_containers"
            echo "Unhealthy containers: $unhealthy_containers"
            
            if [ "$unhealthy_containers" -eq 0 ] && [ "$running_containers" -gt 0 ]; then
              echo "🟢 Overall Status: HEALTHY"
              exit 0
            elif [ "$unhealthy_containers" -gt 0 ]; then
              echo "🟡 Overall Status: DEGRADED"
              exit 1
            else
              echo "🔴 Overall Status: DOWN"
              exit 2
            fi
            EOF

      - name: Create health report
        if: always()
        run: |
          # Create a summary for GitHub Actions
          echo "## 🏥 System Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Check Type:** ${{ github.event.inputs.check_type || 'full' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ steps.vars.outputs.vps_host }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Status:** 🟢 HEALTHY" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" == "failure" ]; then
            echo "**Status:** 🔴 ISSUES DETECTED" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** 🟡 DEGRADED" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup SSH credentials
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts

  notify-on-failure:
    needs: system-health
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "System health check failed. Consider implementing notification service (Slack, Discord, email, etc.)"
          # Example notification implementations:
          
          # Slack webhook example:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 N8N System Health Alert: Issues detected on ${{ steps.vars.outputs.vps_host }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
          
          # Discord webhook example:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"content":"🚨 N8N System Health Alert: Issues detected on ${{ steps.vars.outputs.vps_host }}"}' \
          #   ${{ secrets.DISCORD_WEBHOOK_URL }}
          
          # Email example (requires email service configuration):
          # echo "Health check failed on ${{ steps.vars.outputs.vps_host }}" | mail -s "N8N System Alert" admin@example.com