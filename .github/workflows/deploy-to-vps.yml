name: Deploy to VPS

"on":
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claude/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (prepare but do not activate)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Validate Configuration
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --cache-dir ~/.cache/pip -r requirements.txt

      - name: Validate Docker Compose files
        run: |
          # Test edge stack configuration
          cd edge && docker compose config --quiet

          # Test monitoring stack
          cd ../monitoring && docker compose config --quiet

          # Test service templates (exclude CloudFlared config which is not a Docker Compose file)
          cd ../templates
          for template in *.yml; do
            if [[ "$template" == "system-cloudflared-config.yml" ]]; then
              echo "Skipping CloudFlared config template: $template"
              continue
            fi
            echo "Validating template: $template"
            sed 's/{{NAME}}/test/g; s/{{DOMAIN}}/test.example.com/g; s/{{PORT}}/8080/g; s/{{IMAGE}}/nginx/g; s/{{DB_PASSWORD}}/test/g; s/{{ENCRYPTION_KEY}}/test/g; s/{{JWT_SECRET}}/test/g; s/{{WEBHOOK_DOMAIN}}/hooks.example.com/g' "$template" > "test-$template"
            docker compose -f "test-$template" config --quiet
          done

      - name: Lint shell scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find scripts -name "*.sh" -exec shellcheck {} \;

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to VPS
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment package
        run: |
          mkdir -p deploy-package

          rsync -av \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.claude' \
            --exclude='.windsurf' \
            --exclude='venv/' \
            --exclude='node_modules/' \
            --exclude='services/*/data' \
            --exclude='monitoring/*/data' \
            --exclude='deploy-package' \
            . deploy-package/

          # Create .env file — python3 avoids bash $ expansion of bcrypt hashes
          python3 -c "
          import os
          lines = [
              f'DOMAIN_NAME={os.environ[\"DOMAIN_NAME\"]}',
              f'CLOUDFLARE_TUNNEL_TOKEN={os.environ[\"CLOUDFLARE_TUNNEL_TOKEN\"]}',
              'TRAEFIK_DASHBOARD_AUTH=' + os.environ['TRAEFIK_DASHBOARD_AUTH'].replace('\$', '\$\$'),
              'METRICS_AUTH=' + os.environ['METRICS_AUTH'].replace('\$', '\$\$'),
          ]
          with open('deploy-package/.env', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          "

          # Substitute domain in config files that don't support env var expansion
          sed -i "s/\${DOMAIN_NAME}/${{ secrets.DOMAIN_NAME }}/g" deploy-package/edge/cloudflared/config.yml
          sed -i "s/\${DOMAIN_NAME}/${{ secrets.DOMAIN_NAME }}/g" deploy-package/edge/compose.yml
          sed -i "s/\${DOMAIN_NAME}/${{ secrets.DOMAIN_NAME }}/g" deploy-package/monitoring/compose.yml

          cat > deploy-package/deployment-info.json << EOF
          {
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "triggered_by": "${{ github.actor }}",
            "workflow": "${{ github.workflow }}"
          }
          EOF

          tar -czf deployment.tar.gz -C deploy-package .
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          TRAEFIK_DASHBOARD_AUTH: ${{ secrets.TRAEFIK_DASHBOARD_AUTH }}
          METRICS_AUTH: ${{ secrets.METRICS_AUTH }}

      - name: Upload deployment package
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ secrets.VPS_HOST }} "mkdir -p /home/deployer/deployments"
          scp -i ~/.ssh/id_rsa deployment.tar.gz deployer@${{ secrets.VPS_HOST }}:/home/deployer/deployments/deployment.tar.gz

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ secrets.VPS_HOST }} "DRY_RUN=${{ github.event.inputs.dry_run || 'false' }} bash -s" << 'DEPLOY_EOF'
            set -euo pipefail
            DEPLOY_PATH="/opt/n8n-v2"
            RELEASES="$DEPLOY_PATH/releases"
            SHARED="$DEPLOY_PATH/shared"
            TS="$(date +%Y%m%d_%H%M%S)"
            NEW_REL="$RELEASES/$TS"

            echo "🚀 Deploying release $TS (dry_run=$DRY_RUN)"

            umask 077

            mkdir -p "$RELEASES" "$SHARED/services" "$SHARED/env"
            mkdir -p "$SHARED/backups/"{configs,databases,volumes}

            # Pre-deployment backups
            echo "📦 Creating backups..."

            if [ -d "$SHARED/services" ] && [ "$(ls -A "$SHARED/services")" ]; then
              tar czf "$SHARED/backups/configs/services_${TS}.tar.gz" \
                -C "$SHARED" services env 2>/dev/null || true
            fi

            for container in $(docker ps --format '{{.Names}}' | grep '_postgres$' || true); do
              service_name="${container%_postgres}"
              echo "  Backing up database for $service_name..."
              docker exec "$container" sh -c "pg_dump -U n8n ${service_name}_db -Fc" \
                > "$SHARED/backups/databases/${service_name}_${TS}.dump" 2>/dev/null || \
                echo "  ⚠️ Database backup failed for $service_name"
            done

            PGCONT=$(docker ps --format '{{.Names}}' | grep '_postgres$' | head -1 || true)
            if [ -n "$PGCONT" ]; then
              docker exec "$PGCONT" sh -c 'pg_dumpall -U n8n -g' \
                > "$SHARED/backups/databases/_globals_${TS}.sql" 2>/dev/null || true
            fi

            for vol in $(docker volume ls -q | grep -E 'n8n_data|n8n_files|qdrant' || true); do
              echo "  Backing up volume $vol..."
              docker run --rm -v "$vol":/data -v "$SHARED/backups/volumes":/backup alpine \
                sh -c "tar czf /backup/${vol}_${TS}.tar.gz -C / data"
            done

            echo "  Pruning old backups..."
            find "$SHARED/backups" \( -type f \( -name '*.tar.gz' -o -name '*.sql' -o -name '*.dump' \) \) \
              -printf '%T@ %p\n' | sort -rn | awk 'NR>7 {print $2}' | xargs -r rm -f

            find "$SHARED/backups" -type f -exec chmod 600 {} \; 2>/dev/null || true
            find "$SHARED/backups" -type d -exec chmod 700 {} \; 2>/dev/null || true

            # Extract new release
            echo "📦 Extracting new release..."
            mkdir -p "$NEW_REL"
            tar -xzf /home/deployer/deployments/deployment.tar.gz -C "$NEW_REL"

            if [ -f "$NEW_REL/deployment-info.json" ]; then
              cp "$NEW_REL/deployment-info.json" "$NEW_REL/DEPLOYMENT_INFO.json"
            fi
            echo "RELEASE_ID=$TS" > "$NEW_REL/RELEASE_ID"

            rm -rf "$NEW_REL/services"
            ln -sfn "$SHARED/services" "$NEW_REL/services"
            ln -sfn "$SHARED/env" "$NEW_REL/env"

            if [ -f "$NEW_REL/requirements.txt" ]; then
              echo "🐍 Updating Python dependencies..."
              cd "$NEW_REL"
              if [ ! -d "$NEW_REL/venv" ]; then
                python3 -m venv "$NEW_REL/venv"
              fi
              source "$NEW_REL/venv/bin/activate"
              pip install --upgrade pip
              pip install -r "$NEW_REL/requirements.txt"
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 DRY RUN: Release prepared but not activated"
              echo "  New release at: $NEW_REL"
              echo "  Current still points to: $(readlink -f "$DEPLOY_PATH/current")"
              exit 0
            fi

            echo "🔄 Switching to new release..."
            ln -sfn "$NEW_REL" "$DEPLOY_PATH/current"

            echo "  Cleaning old releases..."
            CURR="$(readlink -f "$DEPLOY_PATH/current" || true)"
            for rel in $(ls -1t "$RELEASES" | tail -n +6); do
              [ "$RELEASES/$rel" = "$CURR" ] && continue
              rm -rf "$RELEASES/$rel"
            done

            echo "✅ Release $TS deployed"
          DEPLOY_EOF

      - name: Update Services
        if: github.event.inputs.dry_run != 'true'
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ secrets.VPS_HOST }} << 'SERVICES_EOF'
            set -euo pipefail
            cd /opt/n8n-v2/current

            docker network create edge >/dev/null 2>&1 || true
            docker network create ai-internal >/dev/null 2>&1 || true

            echo "📡 Updating edge stack..."
            docker compose -p edge --env-file .env -f edge/compose.yml pull
            # --force-recreate: bind-mounted config files (Traefik, Cloudflared)
            # are pinned to the release dir inode at container-start time, so
            # config changes are invisible unless the container is recreated.
            docker compose -p edge --env-file .env -f edge/compose.yml up -d --remove-orphans --force-recreate

            echo "  Waiting for edge to be ready..."
            for i in {1..30}; do
              health_status=$(docker inspect edge-traefik-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "none")
              if [ "$health_status" = "healthy" ]; then
                echo "  ✅ Edge is healthy (attempt $i/30)"
                break
              elif docker exec edge-traefik-1 wget -qO- --timeout=5 http://localhost:8081/ping 2>/dev/null; then
                echo "  ✅ Edge is responding (attempt $i/30)"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "  ⚠️ Edge health check timeout after 30 attempts"
                docker logs edge-traefik-1 --tail 10 2>/dev/null || true
              else
                echo "  Attempt $i/30: health=$health_status, retrying in 2s..."
              fi
              sleep 2
            done

            # Fix monitoring config permissions (containers run as non-root)
            docker run --rm -v /opt/n8n-v2/current/monitoring:/mnt alpine chmod -R o+rX /mnt

            echo "📊 Updating monitoring..."
            docker compose -p monitoring -f monitoring/compose.yml pull
            # --force-recreate: Prometheus rules, Alertmanager config, and
            # Grafana dashboards are bind-mounted from the release dir. See
            # edge stack comment above for why force-recreate is required.
            docker compose -p monitoring -f monitoring/compose.yml up -d --remove-orphans --force-recreate

            echo "✅ Edge and monitoring updated"
          SERVICES_EOF

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ secrets.VPS_HOST }} << 'HEALTH_EOF'
            set -eo pipefail
            cd /opt/n8n-v2

            echo "🔍 Performing health checks..."
            sleep 10

            echo "Checking edge stack..."
            cd /opt/n8n-v2/current/edge
            docker compose ps

            echo "Testing internal connectivity..."
            docker exec edge-traefik-1 wget -qO- --timeout=10 http://localhost:8081/ping 2>/dev/null || echo "Traefik ping not responding (this may be normal)"

            unhealthy=$(docker ps --filter "health=unhealthy" --format "{{.Names}}" | wc -l)
            if [ "$unhealthy" -gt 0 ]; then
              echo "⚠️ Warning: $unhealthy unhealthy containers detected"
              docker ps --filter "health=unhealthy" --format "table {{.Names}}\t{{.Status}}"
            fi

            echo "📊 Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "✅ Health check completed"
          HEALTH_EOF

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ secrets.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup SSH credentials
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts

  rollback:
    runs-on: ubuntu-latest
    name: Rollback
    if: failure() && github.ref == 'refs/heads/main'
    needs: [deploy]

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback deployment
        run: |
          ssh -i ~/.ssh/id_rsa deployer@${{ secrets.VPS_HOST }} << 'ROLLBACK_EOF'
            set -euo pipefail
            DEPLOY_PATH="/opt/n8n-v2"

            echo "🔄 Rolling back to previous release..."

            CURR_REL=$(basename "$(readlink -f "$DEPLOY_PATH/current")")
            PREV=$(ls -1t "$DEPLOY_PATH/releases" | grep -v "^$CURR_REL$" | head -1)

            if [ -n "$PREV" ]; then
              echo "📋 Rolling back from $CURR_REL to $PREV"

              ln -sfn "$DEPLOY_PATH/releases/$PREV" "$DEPLOY_PATH/current"

              cd "$DEPLOY_PATH/current"
              docker run --rm -v "$DEPLOY_PATH/current/monitoring":/mnt alpine chmod -R o+rX /mnt
              docker compose -p edge --env-file .env -f edge/compose.yml up -d --force-recreate
              docker compose -p monitoring -f monitoring/compose.yml up -d --force-recreate

              echo "✅ Rolled back to $PREV"
            else
              echo "❌ No previous release found"
              ls -la "$DEPLOY_PATH/releases/" 2>/dev/null || echo "Releases directory does not exist"
              exit 1
            fi
          ROLLBACK_EOF

      - name: Cleanup SSH credentials
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
