
networks:
  edge:
    external: true

services:
  app:
    image: {{IMAGE}}
    container_name: {{NAME}}
    restart: unless-stopped
    networks: [edge]
    expose: ["{{PORT}}"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{NAME}}.rule=Host(`{{DOMAIN}}`)
      - traefik.http.services.{{NAME}}.loadbalancer.server.port={{PORT}}
      # Optional security headers
      - traefik.http.middlewares.{{NAME}}-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.{{NAME}}-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.{{NAME}}-headers.headers.customFrameOptionsValue=SAMEORIGIN
      - traefik.http.routers.{{NAME}}.middlewares={{NAME}}-headers
    # Add environment variables, volumes, and healthcheck as needed