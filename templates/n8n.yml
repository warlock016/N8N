
networks:
  edge:
    external: true
  ai-internal:
    external: true

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: {{NAME}}
    restart: unless-stopped
    networks: 
      - edge
      - ai-internal
    expose: ["5678"]
    environment:
      # Core configuration
      - N8N_PROTOCOL=https
      - N8N_HOST={{DOMAIN}}
      - WEBHOOK_URL=https://{{DOMAIN}}/
      - N8N_PROXY_HOPS=1
      - N8N_SECURE_COOKIE=true
      - N8N_TRUST_PROXY=true
      
      # Database configuration (PostgreSQL)
      - DB_POSTGRESDB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE={{NAME}}_db
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD={{DB_PASSWORD}}
      
      # Security
      - N8N_ENCRYPTION_KEY={{ENCRYPTION_KEY}}
      - N8N_USER_MANAGEMENT_JWT_SECRET={{JWT_SECRET}}
      
      # Features
      - N8N_RUNNERS_ENABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=true
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_TIMESTAMPS=true
      
      # Security settings (fix deprecation warnings)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - DB_SQLITE_POOL_SIZE=10
      
    volumes:
      - {{NAME}}_data:/home/node/.n8n
      - {{NAME}}_files:/files
    command: start
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{NAME}}.rule=Host(`{{DOMAIN}}`)
      - traefik.http.services.{{NAME}}.loadbalancer.server.port=5678
      - traefik.http.routers.{{NAME}}.entrypoints=web
      
      # Additional n8n specific configuration
      - traefik.docker.network=edge
      - traefik.http.services.{{NAME}}.loadbalancer.server.scheme=http
      
      # Security headers middleware
      - traefik.http.middlewares.{{NAME}}-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.{{NAME}}-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.{{NAME}}-headers.headers.customFrameOptionsValue=SAMEORIGIN
      - traefik.http.middlewares.{{NAME}}-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.{{NAME}}-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.{{NAME}}-headers.headers.stsPreload=true
      - "traefik.http.middlewares.{{NAME}}-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss: ws:; font-src 'self' https:; frame-ancestors 'self';"
      
      # Apply middleware chain
      - traefik.http.routers.{{NAME}}.middlewares={{NAME}}-headers,rate-limit
      
      # WebSocket support for /rest/push
      - traefik.http.routers.{{NAME}}.service={{NAME}}

      # Prometheus metrics scraping
      - prometheus.io/scrape=true
      - prometheus.io/port=5678
      - prometheus.io/path=/metrics
      - service_name={{NAME}}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: {{NAME}}-db
    restart: unless-stopped
    networks:
      - ai-internal
    environment:
      POSTGRES_DB: {{NAME}}_db
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: {{DB_PASSWORD}}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - {{NAME}}_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d {{NAME}}_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  {{NAME}}_data:
    name: {{NAME}}_n8n_data
  {{NAME}}_files:
    name: {{NAME}}_n8n_files
  {{NAME}}_postgres_data:
    name: {{NAME}}_postgres_data