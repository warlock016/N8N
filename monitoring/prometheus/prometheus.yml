global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'n8n-stack'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Traefik metrics (if enabled)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']  # Updated to correct metrics port
    scrape_interval: 15s
    metrics_path: /metrics

  # CloudFlared metrics (configured with static port)
  - job_name: 'cloudflared'
    static_configs:
      - targets: ['cloudflared:2000']  # CloudFlared static metrics port
    scrape_interval: 30s
    metrics_path: /metrics

  # PV Telemetry Application metrics
  # NOTE: If running as a container, ensure it's connected to the 'monitoring' network
  # If running on host, replace 'pv-telemetry-app' with '172.20.0.1:8081' (gateway IP)
  - job_name: 'pv-telemetry-app'
    static_configs:
      - targets: ['pv-telemetry-app:8081']
        labels:
          service: 'pv-telemetry'
          component: 'application'
          metrics_type: 'ingestion'
    scrape_interval: 10s
    metrics_path: /metrics

  # PV Telemetry Database metrics (PostgreSQL/TimescaleDB via postgres-exporter)
  - job_name: 'pv-telemetry-db'
    static_configs:
      - targets: ['pv-telemetry-db-exporter:9187']
        labels:
          service: 'pv-telemetry'
          component: 'database'
          metrics_type: 'postgres'
          database: 'pv_telemetry'
    scrape_interval: 15s
    metrics_path: /metrics

  # Dynamic discovery for services with prometheus labels
  - job_name: 'docker-services'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        match_first_network: false
        filters:
          - name: label
            values: ["prometheus.io/scrape=true"]
    relabel_configs:
      # Use the container name as the instance label
      - source_labels: [__meta_docker_container_name]
        target_label: instance
        regex: '/?(.*)'
      # Only keep containers on the edge or monitoring networks
      - source_labels: [__meta_docker_network_name]
        regex: '(edge|monitoring)'
        action: keep
      # Construct address from edge network IP and prometheus.io/port label
      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_io_port]
        target_label: __address__
        regex: '([^:]+);(.+)'
        replacement: '${1}:${2}'
        separator: ';'
      # Use the prometheus.io/path label as the metrics path
      - source_labels: [__meta_docker_container_label_prometheus_io_path]
        target_label: __metrics_path__
        regex: '(.+)'
      # Add service name from container labels
      - source_labels: [__meta_docker_container_label_service_name]
        target_label: service_name
      # Only scrape containers with the scrape label set to true
      - source_labels: [__meta_docker_container_label_prometheus_io_scrape]
        action: keep
        regex: 'true'