global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'n8n-webhook'

  routes:
    # Critical alerts: shorter repeat interval
    - match:
        severity: critical
      receiver: 'n8n-webhook'
      repeat_interval: 1h

receivers:
  - name: 'n8n-webhook'
    webhook_configs:
      - url: 'http://n8n-private:5678/webhook/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
